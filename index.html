<!DOCTYPE html>
<html>
<head>
    <title>Travel Recommendation Website</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        nav {
            background-color: #222;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            margin-right: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .search-container input {
            padding: 6px;
            border-radius: 4px;
            border: none;
        }

        .search-container button {
            padding: 6px 10px;
            margin-left: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-container button:hover {
            opacity: 0.8;
        }

        section {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact Us</a></li>
    </ul>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search...">
        <button onclick="searchPlace()">Search</button>
        <button onclick="clearResults()">Clear</button>
    </div>
</nav>

<section>
    <h1>Welcome to Our Travel Recommendation Website</h1>
    <p>Discover beautiful beaches, historic temples, and amazing countries around the world.</p>
</section>

<section id="results"></section>

<script>
function searchPlace() {
    let query = document.getElementById("searchInput").value.toLowerCase();
    let results = document.getElementById("results");
    results.innerHTML = "";

    if (query.includes("beach")) {
        results.innerHTML += createCard("Maldives Beach", "https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
        results.innerHTML += createCard("Goa Beach", "https://images.unsplash.com/photo-1587502537745-84a2a4b5b0a0");
    }

    else if (query.includes("temple")) {
        results.innerHTML += createCard("Golden Temple", "https://images.unsplash.com/photo-1609942072337-c3370e820b38");
        results.innerHTML += createCard("Meenakshi Temple", "https://images.unsplash.com/photo-1621416894569-0f39ed31d247");
    }

    else if (query.includes("country")) {
        results.innerHTML += createCard("France", "https://images.unsplash.com/photo-1502602898657-3e91760cbb34");
        results.innerHTML += createCard("Japan", "https://images.unsplash.com/photo-1549692520-acc6669e2f0c");
    }
}

function clearResults() {
    document.getElementById("results").innerHTML = "";
    document.getElementById("searchInput").value = "";
}

function createCard(title, imageUrl) {
    return `
        <div class="card">
            <h3>${title}</h3>
            <img src="${imageUrl}" alt="${title}">
        </div>
    `;
}
</script>

</body>
</html>
